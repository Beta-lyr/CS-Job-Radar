name: Weekly Report

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r services/reporter/requirements.txt

      - name: Generate Weekly Report
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scripts/report/weekly.py
